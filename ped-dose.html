<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pediatric Dose Calc</title>
    <style>
        /* ================= Base Styles ================= */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f2f2f7; 
            margin: 0; 
            padding: 15px;
            color: #333;
        }
        .container { 
            background-color: #ffffff; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        h2 { text-align: center; color: #333; font-size: 20px; margin-bottom: 5px; margin-top: 0; }
        .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
        
        .back-btn { 
            text-decoration: none; 
            color: #007aff; 
            font-weight: bold; 
            display: inline-block; 
            margin-bottom: 15px; 
            font-size: 14px; 
        }

        /* ================= UI Elements ================= */
        label { font-weight: 600; color: #555; display: block; margin-top: 15px; font-size: 14px; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #d1d1d6; 
            border-radius: 8px; 
            font-size: 16px; 
            box-sizing: border-box; 
            background-color: #fafafa; 
            outline: none;
            appearance: none;
        }
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23888%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
        }
        input:focus, select:focus { border-color: #007aff; }

        /* ================= Pediatric Tool Styles ================= */
        .hint { font-size: 12px; color: #ff9500; margin-top: 4px; display: block; line-height: 1.4; }
        .calc-btn { width: 100%; padding: 15px; margin-top: 25px; background-color: #007aff; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .calc-btn:active { background-color: #005bb5; }
        .result-box { margin-top: 20px; padding: 15px; background-color: #e5f1ff; border-radius: 8px; text-align: center; }
        #result { font-size: 22px; font-weight: bold; color: #007aff; margin-top: 8px; line-height: 1.5; }
        .freq-note { font-size: 13px; color: #444; margin-top: 12px; font-weight: bold; }
        .age-note { font-size: 13px; color: #1565c0; margin-top: 15px; background-color: #e3f2fd; padding: 8px; border-radius: 6px; font-weight: bold;}
        .max-dose { font-size: 12px; color: #d32f2f; margin-top: 8px; background-color: #ffebee; padding: 8px; border-radius: 6px; text-align: left;}
        .reference { font-size: 10px; color: #aaa; text-align: center; margin-top: 15px; }
        /* ================= Feedback Box ================= */
        .feedback-box { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #d1d1d6; }
        .feedback-box h3 { font-size: 15px; color: #333; margin-bottom: 10px; margin-top: 0; }
        .feedback-box textarea { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 8px; font-size: 14px; resize: vertical; min-height: 80px; box-sizing: border-box; background-color: #fafafa; font-family: inherit; }
        .send-btn { width: 100%; padding: 12px; margin-top: 10px; background-color: #34c759; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .send-btn:active { background-color: #28a745; }
        .send-btn:disabled { background-color: #a1d6b2; cursor: not-allowed; }
        #reqStatus { font-size: 13px; text-align: center; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅️ กลับหน้าหลัก</a>

    <div class="container">
        <h2>Pediatric Dose Calc</h2>
        <div class="subtitle">คำนวณและแบ่ง Dose ให้ qXh อัตโนมัติ</div>
        
        <label>เลือกยา (Drug):</label>
        <select id="drug" onchange="updateDrugInfo()">
            <option value="">-- กำลังโหลดข้อมูลยาจาก Database... --</option>
        </select>

        <div class="age-note" id="ageNote"></div>

        <div id="weightDoseGroup">
            <label>น้ำหนักเด็ก (kg):</label>
            <input type="number" id="weight" placeholder="ระบุน้ำหนัก (กก.)" inputmode="decimal">

            <label>ขนาดยา (Dose):</label>
            <input type="number" id="dose" inputmode="decimal">
            <span class="hint" id="doseHint"></span>
        </div>

        <div id="concGroup">
            <label>ความเข้มข้นที่มี (Concentration):</label>
            <select id="concentration"></select>
        </div>

        <button id="calcBtn" class="calc-btn" onclick="calculateDose()">คำนวณปริมาตร</button>

        <div class="result-box">
            <div id="unitLabel">ปริมาตรที่คำนวณได้:</div>
            <div id="result">0.00</div>
            <div class="freq-note" id="frequencyNote"></div>
        </div>
        
        <div class="max-dose" id="maxDoseBox"></div>
        <div class="reference">ผู้ใช้งานควรประเมินทางคลินิกและข้อบ่งใช้ของเด็กร่วมด้วยเสมอ</div>
        <div class="feedback-box">
            <h3>💡 เสนอแนะยาที่ต้องการให้เพิ่ม</h3>
            <textarea id="requestText" placeholder="พิมพ์ชื่อยา, ขนาดยา หรือคำแนะนำ..."></textarea>
            <button id="submitReqBtn" class="send-btn" onclick="sendRequest()">ส่งข้อเสนอแนะให้ผู้พัฒนา</button>
            <div id="reqStatus"></div>
        </div>
    </div>

    <script>
        let drugData = {};
        
        // URL ของ Web App Google Sheets
        const webAppUrl = "https://script.google.com/macros/s/AKfycbyMo_b0Y9E4SqHCLRpl-7X1NeaIsdOh0WEEmr7pdpzYPZT7Sq5DwSSijkW_9-dHc-je/exec";

        function loadDrugData() {
            const drugSelect = document.getElementById("drug");
            drugSelect.innerHTML = "<option value=''>-- กำลังโหลดข้อมูลยาจาก Database... --</option>";

            fetch(webAppUrl)
                .then(response => response.json())
                .then(data => {
                    drugData = data;
                    renderDrugSelect();
                    updateDrugInfo(); 
                })
                .catch(error => {
                    console.error("Error loading data:", error);
                    drugSelect.innerHTML = "<option>โหลดข้อมูลล้มเหลว โปรดตรวจสอบการตั้งค่า</option>";
                });
        }

        function renderDrugSelect() {
            const drugSelect = document.getElementById("drug");
            drugSelect.innerHTML = "";

            let groups = {};
            for (let key in drugData) {
                let drug = drugData[key];
                if (!groups[drug.group]) groups[drug.group] = [];
                groups[drug.group].push(drug);
            }

            for (let groupName in groups) {
                let optgroup = document.createElement("optgroup");
                optgroup.label = groupName;
                
                groups[groupName].forEach(drug => {
                    let option = document.createElement("option");
                    option.value = drug.id;
                    option.innerText = drug.displayName;
                    optgroup.appendChild(option);
                });
                
                drugSelect.appendChild(optgroup);
            }
        }

        function updateDrugInfo() {
            let selectedDrug = document.getElementById("drug").value;
            if(!selectedDrug || !drugData[selectedDrug]) return;

            let drug = drugData[selectedDrug];

            document.getElementById("ageNote").innerHTML = "<strong>อายุขั้นต่ำ:</strong> " + drug.age;
            document.getElementById("maxDoseBox").innerHTML = "🚨 <strong>เงื่อนไข:</strong> " + drug.max;
            document.getElementById("frequencyNote").innerText = "** " + drug.freq + " **";

            let concSelect = document.getElementById("concentration");
            concSelect.innerHTML = ""; 
            if (drug.conc) {
                drug.conc.forEach(c => {
                    let option = document.createElement("option");
                    option.value = c.v;
                    option.innerText = c.l;
                    concSelect.appendChild(option);
                });
                document.getElementById("concGroup").style.display = "block";
            } else {
                document.getElementById("concGroup").style.display = "none";
            }
            
            if (drug.type === 'fixed') {
                document.getElementById("weightDoseGroup").style.display = "none";
                document.getElementById("unitLabel").style.display = "none";
                document.getElementById("calcBtn").style.display = "none";
                
                document.getElementById("result").innerHTML = drug.text.replace(/\\n/g, "<br>").replace(/\n/g, "<br>");
                document.getElementById("result").style.color = "#007aff";
                document.getElementById("result").style.fontSize = "16px";
                document.getElementById("result").style.textAlign = "left";
            } else {
                document.getElementById("weightDoseGroup").style.display = "block";
                document.getElementById("unitLabel").style.display = "block";
                document.getElementById("calcBtn").style.display = "block";
                
                document.getElementById("dose").value = drug.dose;
                document.getElementById("doseHint").innerHTML = drug.hint.replace(/\\n/g, "<br>").replace(/\n/g, "<br>");
                document.getElementById("unitLabel").innerText = "ปริมาตรที่คำนวณได้ (" + drug.unit + "):";
                document.getElementById("result").innerText = "0.00 " + drug.unit;
                document.getElementById("result").style.fontSize = "26px";
                document.getElementById("result").style.textAlign = "center";
            }
        }

        function calculateDose() {
            let selectedDrug = document.getElementById("drug").value;
            let drug = drugData[selectedDrug];
            
            if (!drug || drug.type === 'fixed') return;

            let weight = parseFloat(document.getElementById('weight').value);
            let dose = parseFloat(document.getElementById('dose').value);
            let concentration = parseFloat(document.getElementById('concentration').value);

            if(isNaN(weight) || weight <= 0) {
                document.getElementById('result').innerText = "ระบุน้ำหนัก!";
                document.getElementById('result').style.color = "red";
                return;
            }

            let requiredTotal = weight * dose;
            let finalResult = requiredTotal / concentration;

            if (drug.type === 'day') {
                let resultHtml = `รวม ${finalResult.toFixed(2)} ${drug.unit} / วัน<br>`;
                resultHtml += `<div style="font-size: 16px; margin-top: 10px; color: #333; text-align: left; background: #fff; padding: 10px; border-radius: 8px;">`;
                for(let i=0; i<drug.div.length; i++) {
                    let perDose = finalResult / drug.div[i];
                    resultHtml += `➡️ แบ่งให้ ${drug.divName[i]} = <strong style="color:#007aff; font-size:18px;">${perDose.toFixed(2)}</strong> ${drug.unit}/ครั้ง<br>`;
                }
                resultHtml += `</div>`;
                document.getElementById('result').innerHTML = resultHtml;
            } else {
                document.getElementById('result').innerText = finalResult.toFixed(2) + " " + drug.unit + " / ครั้ง";
            }
            document.getElementById('result').style.color = "#007aff";
        }
function sendRequest() {
            let reqText = document.getElementById("requestText").value.trim();
            if (!reqText) {
                alert("กรุณาพิมพ์ข้อความก่อนกดส่งครับ");
                return;
            }

            let statusDiv = document.getElementById("reqStatus");
            let btn = document.getElementById("submitReqBtn");
            
            statusDiv.style.color = "#007aff";
            statusDiv.innerText = "กำลังส่งข้อความ...";
            btn.disabled = true;

            // ใช้ webAppUrl ตัวเดียวกับที่ดึงข้อมูลยา
            fetch(webAppUrl, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ request: reqText })
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === 'success') {
                    statusDiv.style.color = "#34c759";
                    statusDiv.innerText = "✅ ส่งข้อเสนอแนะเรียบร้อย! ขอบคุณครับ";
                    document.getElementById("requestText").value = ""; // ล้างกล่องข้อความ
                } else {
                    statusDiv.style.color = "red";
                    statusDiv.innerText = "❌ เกิดข้อผิดพลาด กรุณาลองใหม่";
                }
            })
            .catch(error => {
                console.error("Error:", error);
                statusDiv.style.color = "red";
                statusDiv.innerText = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อ";
            })
            .finally(() => {
                btn.disabled = false;
                // ให้ข้อความสถานะหายไปหลังจาก 5 วินาที
                setTimeout(() => { statusDiv.innerText = ""; }, 5000);
            });
        }
        window.onload = loadDrugData;
    </script>
</body>
</html>
